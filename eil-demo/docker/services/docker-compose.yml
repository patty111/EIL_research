services:
  providers:
    image: node:22-alpine
    working_dir: /app/scripts
    command: node xlpProviders.js
    environment:
      DEPLOYMENT_FILE: /app/deployment.json
      ENV_FILE: /app/.env
      URL_ETH: http://anvil-arbitrum:8501
      URL_ARB: http://anvil-arbitrum:8501
      URL_OP: http://anvil-optimism:8503
    volumes:
      - ../..:/app
    networks:
      - eil-network-demo

  bundler-arb:
    image: node:22-alpine
    working_dir: /app/scripts
    command: node mockBundler.js
    environment:
      DEPLOYMENT_FILE: /app/deployment.json
      ENV_FILE: /app/.env
      URL_ETH: http://anvil-arbitrum:8501
      URL_ARB: http://anvil-arbitrum:8501
      URL_OP: http://anvil-optimism:8503
      NODE_URL: http://anvil-arbitrum:8501
      PORT: 3000
    ports:
      - '3000:3000'
    volumes:
      - ../..:/app
    networks:
      - eil-network-demo

  bundler-op:
    image: node:22-alpine
    working_dir: /app/scripts
    command: node mockBundler.js
    environment:
      DEPLOYMENT_FILE: /app/deployment.json
      ENV_FILE: /app/.env
      URL_ETH: http://anvil-arbitrum:8501
      URL_ARB: http://anvil-arbitrum:8501
      URL_OP: http://anvil-optimism:8503
      NODE_URL: http://anvil-optimism:8503
      PORT: 3001
    ports:
      - '3001:3001'
    volumes:
      - ../..:/app
    networks:
      - eil-network-demo

networks:
  eil-network-demo:
    name: eil-network-demo
    driver: bridge
    external: true
